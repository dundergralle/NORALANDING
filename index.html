/* Gold grain overlay */
.bg::after {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(180,200,230,0.12) 0%, transparent 65%),
    radial-gradient(ellipse 60% 80% at 50% 100%, rgba(2,5,15,0.7) 0%, transparent 70%),
    linear-gradient(180deg, rgba(2,5,15,0.3) 0%, rgba(2,5,15,0.08) 40%, rgba(2,5,15,0.55) 100%);
}

/* Gold particles */
.particles { position:fixed; inset:0; z-index:2; pointer-events:none; }
.p {
  position:absolute; border-radius:50%;
  background: radial-gradient(circle, #fff 0%, rgba(220,215,210,0.3) 60%, transparent 100%);
  animation: pfloat ease-in-out infinite;
}
@keyframes pfloat {
  0%,100% { transform: translateY(0) scale(1); opacity:0; }
  20% { opacity:1; }
  80% { opacity:0.6; }
  100% { transform: translateY(-80px) scale(0.3); opacity:0; }
}

/* Gold line top */
.gold-line {
  position: fixed; top:0; left:0; right:0; height:2px; z-index:20;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), #fff, rgba(255,255,255,0.6), transparent);
}

/* CONTENT */
.content {
  position: relative; z-index:10;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100dvh;
  padding: max(2.5rem, env(safe-area-inset-top)) 1.5rem max(2.5rem, env(safe-area-inset-bottom));
}

/* AVATAR */
.av-wrap { position:relative; width:110px; height:110px; margin-bottom:1.1rem; }
.av-ring {
  position:absolute; inset:-2px; border-radius:50%;
  background: conic-gradient(rgba(180,200,230,0.5), rgba(60,70,90,0.2), rgba(180,200,230,0.5), rgba(60,70,90,0.2), rgba(180,200,230,0.5));
  animation: spin 8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.av-inner {
  position:absolute; inset:2px; border-radius:50%;
  background: var(--dark); z-index:1;
}
.av-img {
  position:absolute; inset:5px; z-index:2;
  width:calc(100% - 10px); height:calc(100% - 10px);
  border-radius:50%; object-fit:cover; display:block;
}

/* NAME */
h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3.2rem;
  font-weight: 300;
  font-style: italic;
  color: var(--cream);
  letter-spacing: 0.12em;
  text-align: center;
  margin-bottom: 0.2rem;
  text-shadow: 0 0 40px rgba(255,255,255,0.25), 0 2px 8px rgba(0,0,0,0.8);
}

.name-divider {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 0.8rem; width: 180px;
}
.name-divider::before, .name-divider::after {
  content:''; flex:1; height:1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
}
.name-divider span {
  font-size: 0.6rem; color: var(--gold); letter-spacing: 0.3em;
  font-family: 'Jost', sans-serif; font-weight: 400;
  text-transform: uppercase;
}

/* LOCATION */
.loc {
  display:inline-flex; align-items:center; gap:6px;
  font-family:'Montserrat', sans-serif; font-weight:300;
  font-size:0.7rem; letter-spacing:0.18em; text-transform:uppercase;
  color: rgba(245,240,235,0.85);
  margin-bottom: 1.6rem;
  text-shadow: 0 1px 4px rgba(0,0,0,0.6);
}
.loc-dot {
  width:5px; height:5px; border-radius:50%;
  background: #fff;
  box-shadow: 0 0 8px rgba(255,255,255,0.8);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;}50%{opacity:0.3;} }

/* BUTTONS */
.btns {
  display:flex; flex-direction:column; gap:0.6rem;
  width:100%; max-width:300px;
}

.btn {
  position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  width:100%; height:54px; padding:0 2rem 0 1.5rem;
  border-radius: 999px;
  background: rgba(255,255,255,0.06);
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  border: 1px solid rgba(100,120,150,0.2);
  border-left: 2px solid rgba(150,175,210,0.35);
  border-right: 2px solid rgba(150,175,210,0.35);
  color: var(--cream);
  font-family:'Montserrat', sans-serif;
  font-size:0.72rem; font-weight:500;
  letter-spacing:0.22em; text-transform:uppercase;
  text-decoration:none; text-align:center;
  cursor:pointer; touch-action:manipulation;
  user-select:none; -webkit-user-select:none;
  transition: background 0.2s, border-color 0.2s, transform 0.1s;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
}

/* Gold shimmer sweep */
.btn::before {
  content:''; position:absolute;
  top:0; left:-100%; width:60%; height:100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  animation: sweep 4s ease-in-out infinite;
}
@keyframes sweep {
  0%,60%{left:-100%;} 100%{left:140%;}
}

/* Corner accents */
.btn::after {
  content:'';
  position:absolute; inset:0;
  background:
    linear-gradient(to right, rgba(255,255,255,0.7) 8px, transparent 8px) top left / 8px 1px no-repeat,
    linear-gradient(to left,  rgba(255,255,255,0.7) 8px, transparent 8px) top right / 8px 1px no-repeat,
    linear-gradient(to right, rgba(255,255,255,0.7) 8px, transparent 8px) bottom left / 8px 1px no-repeat,
    linear-gradient(to left,  rgba(255,255,255,0.7) 8px, transparent 8px) bottom right / 8px 1px no-repeat;
  opacity:0; transition:opacity 0.2s;
}

.btn-primary {
  background: linear-gradient(135deg, rgba(220,230,255,0.22) 0%, rgba(160,185,240,0.18) 100%);
  border-color: rgba(180,205,255,0.5);
  border-left: 2px solid rgba(200,220,255,0.75);
  border-right: 2px solid rgba(200,220,255,0.75);
  color: #fff;
  font-weight: 500;
  letter-spacing: 0.28em;
  box-shadow:
    0 0 30px rgba(150,190,255,0.2),
    0 8px 24px rgba(0,10,30,0.4),
    inset 0 1px 0 rgba(220,235,255,0.35);
  text-shadow: 0 0 20px rgba(180,210,255,0.5);
}

.btn:active { transform: scale(0.98); }
@media (hover:hover) {
  .btn:hover { background: rgba(201,168,76,0.1); border-color: rgba(201,168,76,0.6); }
  .btn:hover::after { opacity:1; }
}

/* footer */
.footer {
  margin-top:1.8rem;
  font-family:'Cormorant Garamond', serif;
  font-style:italic; font-size:0.75rem;
  color: rgba(255,255,255,0.3);
  letter-spacing:0.1em;
}

@media (max-width:400px) {
  h1 { font-size:2.6rem; }
  .btn { height:48px; font-size:0.68rem; }
}
@media (max-height:640px) {
  .av-wrap { width:88px; height:88px; }
  h1 { font-size:2.4rem; }
  .btns { gap:0.45rem; }
}
</style>
